name: Public safety check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_BASELINE_PATH: .gitleaks-baseline.json

      - name: Check denylisted paths
        run: |
          chmod +x scripts/check_public_safe.sh
          # On PRs, scan the diff against the merge-base; on a direct push,
          # scan the diff against whatever the ref pointed to before the push.
          BASE="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [[ -z "$BASE" || "$BASE" == "0000000000000000000000000000000000000000" ]]; then
            BASE=""
          fi
          ./scripts/check_public_safe.sh "${{ github.sha }}" "$BASE"
