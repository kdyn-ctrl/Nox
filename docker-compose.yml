services:
  # china-data-engine: dedicated async microservice for Chinese financial data.
  # Scrapes East Money, Cailian Press, NBS PMI, and PBOC LPR on a 15-minute
  # APScheduler cycle and caches results in memory. All other containers
  # query it via authenticated HTTP — no container imports akshare directly.
  # Internal-only: port 8000 is NOT exposed to the host. (RULE-012)
  america-data-engine:
    build:
      context: ./america_data_engine
    container_name: nox_america_data_engine
    restart: unless-stopped
    # WS1/architecture: cap NLP-side memory so the sentiment/contradiction layer
    # can never starve or share heap with the C++ execution engine.
    mem_limit: 512m
    environment:
      - WEBHOOK_SECRET_TOKEN=${WEBHOOK_SECRET_TOKEN}
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
      # WS1 — Contradiction Vector: reach heartbeat's IV skew endpoint + tuning.
      - HEARTBEAT_BASE_URL=${HEARTBEAT_BASE_URL:-http://heartbeat-monitor:8002}
      - CONTRADICTION_SKEW_THRESHOLD=${CONTRADICTION_SKEW_THRESHOLD:-0.03}
      - CONTRADICTION_SENTIMENT_THRESHOLD=${CONTRADICTION_SENTIMENT_THRESHOLD:-0.25}
      - CONTRADICTION_BYPASS=${CONTRADICTION_BYPASS:-false}
      # WS3 — Insider Cluster Filter (SEC Form 4).
      - SEC_USER_AGENT=${SEC_USER_AGENT:-Nox/1.0 contact@nox.local}
      - INSIDER_CLUSTER_WINDOW_HOURS=${INSIDER_CLUSTER_WINDOW_HOURS:-48}
      - INSIDER_MIN_EXECS=${INSIDER_MIN_EXECS:-2}
      - INSIDER_CLUSTER_BYPASS=${INSIDER_CLUSTER_BYPASS:-false}
      # WS2 — Alternative Macro Pipeline (physical-supply verification).
      - ALT_INSURANCE_URL=${ALT_INSURANCE_URL:-}
      - ALT_INSURANCE_JSON=${ALT_INSURANCE_JSON:-}
      - ALT_AIS_URL=${ALT_AIS_URL:-}
      - ALT_AIS_JSON=${ALT_AIS_JSON:-}
      - OFAC_ACTIONS_URL=${OFAC_ACTIONS_URL:-https://ofac.treasury.gov/system/files/126/ofac.xml}
      - ALT_MACRO_PHYSICAL_MIN=${ALT_MACRO_PHYSICAL_MIN:-0.30}
      - ALT_MACRO_POLITICAL_MIN=${ALT_MACRO_POLITICAL_MIN:-0.30}
      - ALT_MACRO_BYPASS=${ALT_MACRO_BYPASS:-false}
      # WS6 — Weekend Skeptic Report output directory (mounted from host).
      - SKEPTIC_REPORT_DIR=/app/data
      # Shared watchlist — set once here, propagates to all services.
      - NOX_WATCHLIST_US=${NOX_WATCHLIST_US:-AAPL,TSLA,NVDA,MSFT}
      - NOX_WATCHLIST_CN=${NOX_WATCHLIST_CN:-BABA,JD,PDD,BIDU,NIO}
    volumes:
      # WS6: weekend batch writes reports here; path appears on host at data/.
      - ./data:/app/data
    networks:
      - nox_net
  china-data-engine:
    build:
      context: ./china_data_engine
    container_name: nox_china_data_engine
    restart: unless-stopped
    mem_limit: 512m
    environment:
      - WEBHOOK_SECRET_TOKEN=${WEBHOOK_SECRET_TOKEN}
    networks:
      - nox_net

  analyst-brain:
    build:
      context: .
      dockerfile: analyst/Dockerfile
    container_name: nox_analyst
    restart: unless-stopped
    depends_on:
      - execution-engine
    environment:
      - TZ=America/New_York
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
      - WEBHOOK_SECRET_TOKEN=${WEBHOOK_SECRET_TOKEN}
      - ANALYST_CYCLE_HOURS=${ANALYST_CYCLE_HOURS:-6}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: 10
    networks:
      - nox_net

  execution-engine:
    build:
      context: .
      dockerfile: execution/Dockerfile
    container_name: nox_execution
    restart: unless-stopped
    environment:
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
      - WEBHOOK_SECRET_TOKEN=${WEBHOOK_SECRET_TOKEN}
      - ALPACA_BASE_URL=${ALPACA_BASE_URL}
      - KELLY_WIN_RATE=${KELLY_WIN_RATE}
      - KELLY_WIN_LOSS_RATIO=${KELLY_WIN_LOSS_RATIO}
      - KELLY_FRACTION=${KELLY_FRACTION}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - OPTIONS_BOT_AUTO_EXECUTE=${OPTIONS_BOT_AUTO_EXECUTE:-false}
      - OPTIONS_BOT_MAX_SIGNALS=${OPTIONS_BOT_MAX_SIGNALS:-3}
      - OPTIONS_PERSONAL_MAX_SIGNALS=${OPTIONS_PERSONAL_MAX_SIGNALS:-2}
      # WS5 — Liquidity Vacuum / Microstructure Gate.
      - LIQUIDITY_GATE_STDDEV=${LIQUIDITY_GATE_STDDEV:-3.0}
      - LIQUIDITY_GATE_WINDOW=${LIQUIDITY_GATE_WINDOW:-50}
      - LIQUIDITY_GATE_MIN_SAMPLES=${LIQUIDITY_GATE_MIN_SAMPLES:-10}
      - LIQUIDITY_GATE_BYPASS=${LIQUIDITY_GATE_BYPASS:-false}
      # Equity signal scanner — independent momentum scanner to validate pipeline.
      - EQUITY_SCAN_ENABLED=${EQUITY_SCAN_ENABLED:-true}
      - EQUITY_SCAN_WATCHLIST=${EQUITY_SCAN_WATCHLIST:-AAPL,MSFT,NVDA,TSLA,AMZN,META,GOOGL,AMD}
      - EQUITY_SCAN_INTERVAL_MINUTES=${EQUITY_SCAN_INTERVAL_MINUTES:-30}
      - EQUITY_SCAN_MAX_SIGNALS=${EQUITY_SCAN_MAX_SIGNALS:-2}
      - EQUITY_SCAN_BYPASS_HOURS=${EQUITY_SCAN_BYPASS_HOURS:-false}
      # Persistence — must match the volume mount below so data survives restarts.
      - MEMORY_BANK_PATH=/app/data/memory_bank.db
      - CN_POSITIONS_PATH=/app/data/china_positions.json
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: 10
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.execution-webhook.rule=Path(`/webhook`)"
      - "traefik.http.routers.execution-webhook.entrypoints=web,websecure"
      - "traefik.http.routers.execution-webhook.tls.certresolver=letsencrypt"
      - "traefik.http.services.execution-webhook.loadbalancer.server.port=8080"
    networks:
      - nox_net

  heartbeat-monitor:
    build:
      context: ./heartbeat
    container_name: nox_heartbeat
    restart: unless-stopped
    mem_limit: 768m
    depends_on:
      - china-data-engine
      - america-data-engine
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
      # Shared secret used to authenticate requests to the china-data-engine API.
      - WEBHOOK_SECRET_TOKEN=${WEBHOOK_SECRET_TOKEN}
      # WS1 — port for the internal IV skew endpoint served to the data engines.
      - HEARTBEAT_IV_PORT=${HEARTBEAT_IV_PORT:-8002}
      # Shared watchlist — must match america-data-engine above.
      - NOX_WATCHLIST_US=${NOX_WATCHLIST_US:-AAPL,TSLA,NVDA,MSFT}
      - NOX_WATCHLIST_CN=${NOX_WATCHLIST_CN:-BABA,JD,PDD,BIDU,NIO}
      - NOX_DAILY_REPORT_TICKERS=${NOX_DAILY_REPORT_TICKERS:-AAPL,TSLA,NVDA,MSFT,BABA,JD,PDD,BIDU}
      - MAX_DAILY_REPORT_SEC_TICKERS=${MAX_DAILY_REPORT_SEC_TICKERS:-8}
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    command: sh -c "mkdir -p /app/reports && python -u monitor.py"
    networks:
      - nox_net

