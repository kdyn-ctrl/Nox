services:
  analyst-brain:
    build:
      context: ./analyst
    container_name: openclaw_analyst
    restart: unless-stopped
    depends_on:
      - execution-engine
    environment:
      - TZ=America/New_York
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
      - WEBHOOK_SECRET_TOKEN=${WEBHOOK_SECRET_TOKEN}
    volumes:
      - ./logs:/app/logs
    networks:
      - default

  execution-engine:
    build:
      context: ./execution
    container_name: openclaw_execution
    restart: unless-stopped
    environment:
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
      - WEBHOOK_SECRET_TOKEN=${WEBHOOK_SECRET_TOKEN}
      - ALPACA_BASE_URL=${ALPACA_BASE_URL}
      - KELLY_WIN_RATE=${KELLY_WIN_RATE}
      - KELLY_WIN_LOSS_RATIO=${KELLY_WIN_LOSS_RATIO}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    ports:
      - "8080:8080"
    networks:
      - default

  heartbeat-monitor:
    build:
      context: ./heartbeat
    container_name: openclaw_heartbeat
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
    volumes:
      - ./data:/app/data
    networks:
      - default

networks:
  default:
    name: openclaw_net


